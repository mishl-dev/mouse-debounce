name: AUR Release
on:
  push:
    tags:
      - 'v*'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check
  aur:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - name: Bump pkgver
        run: sed -i "s/^pkgver=.*/pkgver=${GITHUB_REF_NAME#v}/" PKGBUILD
      - name: Update AUR
        uses: KSXGitHub/github-actions-deploy-aur@master
        with:
          pkgname: mouse-debounce
          pkgbuild: ./PKGBUILD
          commit_username: mishl
          commit_email: meow@mishl.dev
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
          updpkgsums: true
          assets: |
            ./mouse-debounce.install
            ./mouse-debounce.service